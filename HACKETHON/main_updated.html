<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Disaster Resource Optimizer - Backend Powered</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* Sidebar */

.sidebar{
width:240px;
background:#1976d2;
color:white;
position:fixed;
top:0;
bottom:0;
padding:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:40px;
}

.nav-item{
padding:15px;
cursor:pointer;
border-radius:10px;
}

.nav-item:hover{
background:rgba(255,255,255,0.2);
}

/* Main */

.main{
margin-left:240px;
padding:30px;
}

/* Header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.toggleBtn{
padding:8px 12px;
background:#1976d2;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* Form */

.form{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.form input,
.form select{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.form button{
padding:12px;
background:#1976d2;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

/* Cards */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* Risk */

.risk{
padding:10px;
border-radius:8px;
color:white;
text-align:center;
font-weight:bold;
}

.Low{background:green}
.Medium{background:orange}
.High{background:red}

/* Chart */

.chart-container{
background:white;
padding:20px;
border-radius:12px;
margin-top:20px;
}

/* Maps */

.map-container{
margin-top:20px;
display:flex;
flex-wrap:wrap;
gap:15px;
}

.map-container iframe{
width:100%;
height:300px;
border:none;
border-radius:10px;
}

/* Dark mode */

.dark{
background:#121212;
color:white;
}

.dark .card,
.dark .form,
.dark .chart-container{
background:#1f1f1f;
}

/* Loading spinner */
.loading {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255,255,255,.3);
    border-radius: 50%;
    border-top-color: #fff;
    animation: spin 1s ease-in-out infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Status messages */
.status-message {
    padding: 10px;
    border-radius: 5px;
    margin: 10px 0;
}

.status-success {
    background-color: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
}

.status-error {
    background-color: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>🚨 Disaster Optimizer</h2>

<div class="nav-item">🏠 Home</div>
<div class="nav-item">📊 Dashboard</div>
<div class="nav-item">🗺 Map</div>
<div class="nav-item">⚙ Settings</div>
<h4>📞Emergency contacts:</h4>
<div id="emergencyContacts"></div>
</div>


<div class="main">

<div class="header">
<h1>Dashboard</h1>
<div class="summary"></div>
<button class="toggleBtn" onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<p id="time"></p>

<div id="statusMessage"></div>

<div class="form">

<h3>Disaster Analysis</h3>

<select id="disaster">
<option>Flood</option>
<option>Earthquake</option>
<option>Cyclone</option>
<option>Wildfire</option>
<option>Landslide</option>
<option>Tsunami</option>
<option>Drought</option>
<option>Heatwave</option>
</select>

<select id="severity">
<option value="1">Low Severity</option>
<option value="2">Medium Severity</option>
<option value="3">High Severity</option>
</select>

<input type="number" id="people" placeholder="Population">

<input type="text" id="location" placeholder="Location">

<button onclick="predict()" id="analyzeBtn">Analyze Disaster</button>

<div id="risk" class="risk"></div>

<div id="summary"></div>

<button onclick="downloadReport()">Download Report</button>

</div>


<div class="cards" id="dashboard"></div>

<div class="chart-container">
<canvas id="resourceChart"></canvas>
</div>

<div class="map-container">

<iframe id="mapFrame"
src="https://maps.google.com/maps?q=India&output=embed">
</iframe>

<div style="width:100%">

<h3>🚑 Rescue Route</h3>

<input id="rescueStart" placeholder="Rescue Team Location">

<input id="rescueEnd" placeholder="Disaster Location">

<button onclick="findRoute()">Find Route</button>

<iframe id="routeMap"
src="https://maps.google.com/maps?q=India&output=embed">
</iframe>

<div id="routeResult"></div>

</div>

</div>

</div>


<script>

let chart
const API_BASE = 'http://localhost:8000/api'

/* Dark Mode */

function toggleDark(){
document.body.classList.toggle("dark")
}

/* Clock */

setInterval(()=>{
document.getElementById("time").innerHTML=
new Date().toLocaleString()
},1000)

/* Status Messages */

function showStatus(message, type = 'success') {
    const statusEl = document.getElementById('statusMessage')
    statusEl.className = `status-message status-${type}`
    statusEl.textContent = message
    statusEl.style.display = 'block'
    
    setTimeout(() => {
        statusEl.style.display = 'none'
    }, 5000)
}

/* Load Emergency Contacts */

async function loadEmergencyContacts() {
    try {
        const response = await fetch(`${API_BASE}/emergency-contacts/`)
        const contacts = await response.json()
        
        const contactsHTML = contacts.map(contact => 
            `<div class="card">${contact.icon} ${contact.name}<br>${contact.number}</div><br>`
        ).join('')
        
        document.getElementById('emergencyContacts').innerHTML = contactsHTML
    } catch (error) {
        console.error('Error loading emergency contacts:', error)
        // Fallback to hardcoded contacts
        document.getElementById('emergencyContacts').innerHTML = `
            <div class="card">🚑ambulance<br>102</div><br>
            <div class="card">🚒firebrigade<br>101</div><br>
            <div class="card">🚔 Police<br>100</div><br>
            <div class="card">🆘 Disaster-Helpline<br>108</div>
        `
    }
}

/* Predict */

async function predict(){
    const analyzeBtn = document.getElementById('analyzeBtn')
    const originalText = analyzeBtn.textContent
    
    try {
        analyzeBtn.innerHTML = '<span class="loading"></span> Analyzing...'
        analyzeBtn.disabled = true

        let disaster = document.getElementById("disaster").value
        let severity = parseInt(document.getElementById("severity").value)
        let people = parseInt(document.getElementById("people").value)
        let location = document.getElementById("location").value

        if(!people || !location){
            showStatus("Please fill all fields", 'error')
            return
        }

        // Call Django API
        const response = await fetch(`${API_BASE}/analyze/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                disaster_type: disaster,
                severity: severity,
                population: people,
                location: location
            })
        })

        if (!response.ok) {
            throw new Error('Analysis failed')
        }

        const data = await response.json()
        
        // Update risk level
        let riskEl = document.getElementById("risk")
        riskEl.className = "risk " + data.risk_level
        riskEl.innerHTML = "⚠ " + data.risk_level + " Risk<br>Priority: " + data.priority

        // Update summary
        document.getElementById("summary").innerHTML = data.summary

        // Update dashboard with resources
        const resources = data.resources
        let dashboardHTML = `
            <div class="card">🍞 Food Packets<br><br>${resources.food_packets}</br><div class="unit">packets</div>
            </div>
            <div class="card">💧 Water<br><br>${resources.water_liters}</br><div class="unit">Liters</div>
            </div>
            <div class="card">🏥 Medical Kits<br>${resources.medical_kits}</div>
            <div class="card">🏠 Shelters<br>${resources.shelters}</div>
            <div class="card">🚑 Rescue Teams<br>${resources.rescue_teams}</div>
            <div class="card">👷 Volunteers<br>${resources.volunteers}</div>
            <div class="card">🚑 Ambulances<br>${resources.ambulances}</div>
        `
        
        if (!["Flood", "Cyclone", "Tsunami"].includes(disaster)) {
            dashboardHTML += `<div class="card">🚒Firetrucks<br>${resources.firetrucks}</div>`
        }
        
        dashboardHTML += `
            <div class="card">🏥 Medical Teams<br>${resources.medical_teams}</div>
            <div class="card">🚁 Helicopters<br>${resources.helicopters}</div>
        `

        document.getElementById("dashboard").innerHTML = dashboardHTML

        // Update map
        document.getElementById("mapFrame").src = data.map_url

        // Update chart
        let ctx = document.getElementById("resourceChart").getContext("2d")
        if(chart) chart.destroy()

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Food", "Water", "Medical", "Shelters", "Rescue", "Volunteers"],
                datasets: [{
                    label: "Resources",
                    data: [
                        resources.food_packets, 
                        resources.water_liters, 
                        resources.medical_kits, 
                        resources.shelters, 
                        resources.rescue_teams, 
                        resources.volunteers
                    ],
                    backgroundColor: "rgba(25,118,210,0.7)"
                }]
            }
        })

        // Show weather alert if flood risk
        if (data.weather && data.weather.flood_risk) {
            showStatus("⚠ Possible Flood Risk detected in weather data", 'error')
        }

        showStatus("Disaster analysis completed successfully!", 'success')

    } catch (error) {
        console.error('Error:', error)
        showStatus("Failed to analyze disaster. Please try again.", 'error')
        
        // Fallback to client-side calculation
        predictFallback()
    } finally {
        analyzeBtn.textContent = originalText
        analyzeBtn.disabled = false
    }
}

/* Fallback predict function (original client-side logic) */

function predictFallback(){
    let disaster=document.getElementById("disaster").value
    let severity=parseInt(document.getElementById("severity").value)
    let people=parseInt(document.getElementById("people").value)
    let location=document.getElementById("location").value

    if(!people || !location){
        alert("Fill all fields")
        return
    }

    /* Resource Calculation */
    let food=Math.ceil((people*severity)/2)
    let water=Math.ceil((people*severity)*1.5)
    let medical=Math.ceil(people/10)*severity
    let shelters=Math.ceil(people/25)
    let rescue=Math.ceil((people*severity)/8)
    let volunteers=Math.ceil(people/20)

    let ambulances=Math.ceil(people/100)
    let firetrucks=Math.ceil(people/200)
    let medicalteams=Math.ceil(people/150)
    let helicopters=Math.ceil(people/500)

    /* Risk */
    let riskScore=(severity*2)+(people/500)
    let riskLevel="Low"
    if(riskScore>5) riskLevel="Medium"
    if(riskScore>10) riskLevel="High"

    let riskEl=document.getElementById("risk")
    riskEl.className="risk "+riskLevel
    riskEl.innerHTML="⚠ "+riskLevel+" Risk"

    /* Priority */
    let priority="Normal"
    if(people>1000 && severity==3){
        priority="CRITICAL"
        alert("🚨 Emergency! Immediate response required.")
    }
    riskEl.innerHTML+="<br>Priority: "+priority

    /* Summary */
    document.getElementById("summary").innerHTML=
    "📍 "+location+" | 👥 "+people+" people affected"

    /* Dashboard */
    let dashboardHTML=`
    <div class="card">🍞 Food Packets<br><br>${food}</br><div class="unit">packets</div>
    </div>
    <div class="card">💧 Water<br><br>${water}</br><div class="unit">Liters</div>
    </div>
    <div class="card">🏥 Medical Kits<br>${medical}</div>
    <div class="card">🏠 Shelters<br>${shelters}</div>
    <div class="card">🚑 Rescue Teams<br>${rescue}</div>
    <div class="card">👷 Volunteers<br>${volunteers}</div>
    <div class="card">🚑 Ambulances<br>${ambulances}</div>`
    
    if(!["Flood","Cyclone","Tsunami"].includes(disaster)){
        dashboardHTML+='<div class="card">🚒Firetrucks<br>${firetrucks}</div>'
    }
    
    dashboardHTML+=`
    <div class="card">🏥 Medical Teams<br>${medicalteams}</div>
    <div class="card">🚁 Helicopters<br>${helicopters}</div>
    `

    document.getElementById("dashboard").innerHTML=dashboardHTML

    /* Map */
    document.getElementById("mapFrame").src=
    "https://maps.google.com/maps?q="+location+"&output=embed"

    /* Chart */
    let ctx=document.getElementById("resourceChart").getContext("2d")
    if(chart) chart.destroy()

    chart=new Chart(ctx,{
        type:'bar',
        data:{
            labels:["Food","Water","Medical","Shelters","Rescue","Volunteers"],
            datasets:[{
                label:"Resources",
                data:[food,water,medical,shelters,rescue,volunteers],
                backgroundColor:"rgba(25,118,210,0.7)"
            }]
        }
    })
}

/* Route Finder */

async function findRoute(){
    let start=document.getElementById("rescueStart").value
    let end=document.getElementById("rescueEnd").value

    if(!start || !end){
        showStatus("Enter both locations", 'error')
        return
    }

    try {
        const response = await fetch(`${API_BASE}/calculate-route/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                start: start,
                end: end
            })
        })

        if (!response.ok) {
            throw new Error('Route calculation failed')
        }

        const data = await response.json()
        
        document.getElementById("routeMap").src = data.map_url
        document.getElementById("routeResult").innerHTML = data.summary
        showStatus("Route calculated successfully!", 'success')

    } catch (error) {
        console.error('Error:', error)
        // Fallback to client-side route calculation
        document.getElementById("routeMap").src =
        "https://maps.google.com/maps?saddr="+start+"&daddr="+end+"&output=embed"
        document.getElementById("routeResult").innerHTML =
        "Fastest route from "+start+" to "+end
    }
}

/* Download Report */

function downloadReport(){
    let data=document.getElementById("dashboard").innerText
    let blob=new Blob([data],{type:"text/plain"})

    let a=document.createElement("a")
    a.href=URL.createObjectURL(blob)
    a.download="disaster_report.txt"
    a.click()
}

/* Initialize */

document.addEventListener('DOMContentLoaded', function() {
    loadEmergencyContacts()
})

</script>

</body>
</html>
