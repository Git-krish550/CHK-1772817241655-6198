<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Disaster Resource Optimizer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* Sidebar */

.sidebar{
width:240px;
background:#1976d2;
color:white;
position:fixed;
top:0;
bottom:0;
padding:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:40px;
}

.nav-item{
padding:15px;
cursor:pointer;
border-radius:10px;
}

.nav-item:hover{
background:rgba(255,255,255,0.2);
}

/* Main */

.main{
margin-left:240px;
padding:30px;
}

/* Header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.toggleBtn{
padding:8px 12px;
background:#1976d2;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* Form */

.form{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.form input,
.form select{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.form button{
padding:12px;
background:#1976d2;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

/* Cards */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* Risk */

.risk{
padding:10px;
border-radius:8px;
color:white;
text-align:center;
font-weight:bold;
}

.Low{background:green}
.Medium{background:orange}
.High{background:red}

/* Chart */

.chart-container{
background:white;
padding:20px;
border-radius:12px;
margin-top:20px;
}

/* Maps */

.map-container{
margin-top:20px;
display:flex;
flex-wrap:wrap;
gap:15px;
}

.map-container iframe{
width:100%;
height:300px;
border:none;
border-radius:10px;
}

/* Dark mode */

.dark{
background:#121212;
color:white;
}

.dark .card,
.dark .form,
.dark .chart-container{
background:#1f1f1f;
}

/* Voice Button */

.voice-btn{
background:#ff5252;
color:white;
border:none;
padding:10px;
border-radius:50%;
cursor:pointer;
font-size:18px;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>🚨 Disaster Optimizer</h2>

<div class="nav-item">🏠 Home</div>
<div class="nav-item">📊 Dashboard</div>
<div class="nav-item">🗺 Map</div>
<div class="nav-item">⚙ Settings</div>

<h4>📞 Emergency Contacts</h4>

<div class="card">🚑 Ambulance<br>102</div><br>
<div class="card">🚒 Fire<br>101</div><br>
<div class="card">🚔 Police<br>100</div><br>
<div class="card">🆘 Disaster<br>108</div>

</div>

<div class="main">

<div class="header">
<h1>Dashboard</h1>
<button class="toggleBtn" onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<p id="time"></p>

<div class="form">

<h3>Disaster Analysis</h3>

<select id="disaster">
<option>Flood</option>
<option>Earthquake</option>
<option>Cyclone</option>
<option>Wildfire</option>
<option>Landslide</option>
<option>Tsunami</option>
<option>Drought</option>
<option>Heatwave</option>
</select>

<select id="severity">
<option value="1">Low Severity</option>
<option value="2">Medium Severity</option>
<option value="3">High Severity</option>
</select>

<input type="number" id="people" placeholder="Population">

<div style="display:flex;gap:10px">

<input type="text" id="location" placeholder="Location">

<button class="voice-btn" onclick="startVoice()">🎤</button>

</div>

<button onclick="predict()">Analyze Disaster</button>

<div id="risk" class="risk"></div>

<div id="summary"></div>

<button onclick="downloadReport()">Download Report</button>

</div>

<div class="cards" id="dashboard"></div>

<div class="chart-container">
<canvas id="resourceChart"></canvas>
</div>

<div class="map-container">

<iframe id="mapFrame"
src="https://maps.google.com/maps?q=India&output=embed">
</iframe>

<div style="width:100%">

<h3>🚑 Rescue Route</h3>

<input id="rescueStart" placeholder="Rescue Team Location">

<input id="rescueEnd" placeholder="Disaster Location">

<button onclick="findRoute()">Find Route</button>

<iframe id="routeMap"
src="https://maps.google.com/maps?q=India&output=embed">
</iframe>

<div id="routeResult"></div>

</div>

</div>

</div>

<script>

let chart

/* CLOCK */

setInterval(()=>{
document.getElementById("time").innerHTML =
new Date().toLocaleString()
},1000)

/* DARK MODE */

function toggleDark(){
document.body.classList.toggle("dark")
}

/* VOICE INPUT */

function startVoice(){

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition

if(!SpeechRecognition){
alert("Voice recognition not supported in this browser")
return
}

const recognition = new SpeechRecognition()

recognition.lang="en-IN"

recognition.start()

recognition.onresult=function(event){

const text = event.results[0][0].transcript

document.getElementById("location").value=text

}

}

/* PREDICT */

function predict(){

let disaster=document.getElementById("disaster").value
let severity=parseInt(document.getElementById("severity").value)
let people=parseInt(document.getElementById("people").value)
let location=document.getElementById("location").value

if(!people || !location){
alert("Fill all fields")
return
}

let food=Math.ceil((people*severity)/2)
let water=Math.ceil((people*severity)*1.5)
let medical=Math.ceil(people/10)*severity
let shelters=Math.ceil(people/25)
let volunteers=Math.ceil((people*severity)/8)
let rescue=Math.ceil(people/20)

let ambulances=Math.ceil(people/100)
let firetrucks=Math.ceil(people/200)
let medicalteams=Math.ceil(people/150)
let helicopters=Math.ceil(people/500)

let riskScore=(severity*2)+(people/500)

let riskLevel="Low"
if(riskScore>5) riskLevel="Medium"
if(riskScore>10) riskLevel="High"

let riskEl=document.getElementById("risk")

riskEl.className="risk "+riskLevel

riskEl.innerHTML="⚠ "+riskLevel+" Risk"

document.getElementById("summary").innerHTML=
`📍 ${location} | 👥 ${people} people affected`

let dashboardHTML=`

<div class="card">🍞 Food Packets<br>${food}</div>
<div class="card">💧 Water<br>${water}</div>
<div class="card">🏥 Medical Kits<br>${medical}</div>
<div class="card">🏠 Shelters<br>${shelters}</div>
<div class="card">🚑 Rescue Teams<br>${rescue}</div>
<div class="card">👷 Volunteers<br>${volunteers}</div>
<div class="card">🚑 Ambulances<br>${ambulances}</div>
<div class="card">🏥 Medical Teams<br>${medicalteams}</div>
<div class="card">🚁 Helicopters<br>${helicopters}</div>
`

if(!["Flood","Cyclone","Tsunami"].includes(disaster)){
dashboardHTML+=`<div class="card">🚒 Firetrucks<br>${firetrucks}</div>`
}

document.getElementById("dashboard").innerHTML=dashboardHTML

document.getElementById("mapFrame").src =
"https://maps.google.com/maps?q="+location+"&output=embed"

let ctx=document.getElementById("resourceChart").getContext("2d")

if(chart) chart.destroy()

chart=new Chart(ctx,{
type:'bar',
data:{
labels:["Food","Water","Medical","Shelters","Rescue","Volunteers"],
datasets:[{
label:"Resources",
data:[food,water,medical,shelters,rescue,volunteers],
backgroundColor:"rgba(25,118,210,0.7)"
}]
}
})

}

/* ROUTE FINDER */

function findRoute(){

let start=document.getElementById("rescueStart").value
let end=document.getElementById("rescueEnd").value

document.getElementById("routeMap").src =
"https://maps.google.com/maps?saddr="+start+"&daddr="+end+"&output=embed"

document.getElementById("routeResult").innerHTML =
"Fastest route from "+start+" to "+end

}

/* DOWNLOAD REPORT */

function downloadReport(){

let data=document.getElementById("dashboard").innerText

let blob=new Blob([data],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="disaster_report.txt"
a.click()

}

</script>

</body>
</html>
